<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Friends Table</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background-color: #ffffff;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: green;
      margin-bottom: 20px;
      font-size: 40px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #f5f5f5;
    }

    th,
    td {
      border: 1px solid #dcdcdc;
      padding: 18px;
      text-align: left;
      font-size: 22px;
    }

    th {
      font-weight: bold;
      background-color: #f0f0f0;
    }
    
    #myInput{
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 1px solid #b5c7d3;
      outline: none;
      margin-bottom: 12px;
    }

    #myInput:focus{
      border: 2px solid #7aa7c7;
    }

    tr:hover {
      background-color: #e9e9e9;
      transition: 0.3s;
    }
  </style>
</head>

<body>

  <h1>MY FRIENDS</h1>

  <input type="text" id="myInput" placeholder="names..." onkeyup="searchFunct()">

  <table id="myTable">
    <thead>
      <tr class="header">
        <th style="width: 40%;">Name</th>
        <th style="width: 30%;">Degree</th>
        <th style="width: 30%;">Profession</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Vinod</td>
        <td>MCS</td>
        <td>Full Stack Developer</td>
      </tr>

      <tr>
        <td>Bahadur</td>
        <td>BBA</td>
        <td>HR Manager</td>
      </tr>

      <tr>
        <td>Thapa</td>
        <td>BCS</td>
        <td>Front End Developer</td>
      </tr>

      <tr>
        <td>Arjun</td>
        <td>MCS</td>
        <td>Full Stack Developer</td>
      </tr>

      <tr>
        <td>Ramesh</td>
        <td>MCS</td>
        <td>Full Stack Developer</td>
      </tr>

      <tr>
        <td>Ram</td>
        <td>MCA</td>
        <td>Full Stack Developer</td>
      </tr>

      <tr>
        <td>Amit</td>
        <td>BCS</td>
        <td>Full Stack Developer</td>
      </tr>

      <tr>
        <td>Naran</td>
        <td>MCS</td>
        <td>Full Stack Developer</td>
      </tr>
    </tbody>
  </table>


  <script>

function searchFunct(){
    let filter = document.getElementById("myInput").value.toUpperCase();
    let myTable = document.getElementById("myTable")
    let tr = myTable.getElementsByTagName("tr")

    for(let i = 0; i <tr.length; i++){
        let td = tr[i].getElementsByTagName('td')[0]

        if(td){
            let textValue = td.textContent || td.innerHTML

            if(textValue.toUpperCase().indexOf(filter) > -1){
                tr[i].style.display = ""
            } else{
                tr[i].style.display = "none"
            }
        }
    }


}
  </script>
</body>
</html>
