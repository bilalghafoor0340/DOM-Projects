<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRcode Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <p>Enter the text or URL:</p>
        <input type="text" name="" id="inputText">
        <div id="imgBox">
            <img src="" id="imgShow">
        </div>
        
        <button onclick="generateCode()" >Generated QRCode</button>
    </div>
    
    <script>

        let imgBox = document.getElementById("imgBox");
           let imgShow = document.getElementById("imgShow");
           let inputText = document.getElementById("inputText");

        function generateCode(){
           
           
            if(inputText.value.length > 0){
                imgShow.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + inputText.value;
           imgBox.classList.add("show-img");
            } else{
                inputText.classList.add('error')
                setTimeout(() => {
                    inputText.classList.remove('error')
                }, 1000);
            }
        }

    </script>
</body>
</html>
